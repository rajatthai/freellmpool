# freellmpool provider catalog. Keys are NEVER stored here — only the env var
# name. Models are discovered from each provider's /models endpoint and filtered
# to chat models, then live reachability-tested. Models that failed are
# enabled=false: skipped by auto-routing, still callable if pinned explicitly.
# rpd = conservative free-tier daily-request hint (0 = unknown/unmetered).

[[provider]]
id = "pollinations"
label = "Pollinations (keyless)"
adapter = "openai"
base_url = "https://text.pollinations.ai/openai"
auth = "none"
models = [
    { name = "openai", rpd = 0 },
    { name = "openai-fast", rpd = 0 },
    { name = "mistral", rpd = 0 },
]

[[provider]]
id = "llm7"
label = "LLM7 (key optional)"
adapter = "openai"
base_url = "https://api.llm7.io/v1"
key_env = "LLM7_API_KEY"
key_optional = true
models = [
