    <svg id="screen" width="768" height="408" x="23" y="50" viewBox="0 0 768 408" preserveAspectRatio="xMidYMin slice"><rect class="background" height="100%" width="100%" x="0" y="0"/><defs><g id="g1"><text x="0" textLength="8" class="color6">$</text><text x="8" textLength="192" class="foreground"> pip install freellmpool</text></g><g id="g2"><text x="0" textLength="8" class="background"> </text></g><g id="g3"><text x="0" textLength="8" class="color6">$</text><text x="8" textLength="472" class="foreground"> freellmpool ask "Explain the CAP theorem in one sentence."</text></g><g id="g4"><text x="0" textLength="768" class="foreground">The **CAP theorem** states that in a distributed system, you can only guarantee **two** of the f</text></g><g id="g5"><text x="0" textLength="768" class="foreground">ollowing three properties at once: **Consistency**, **Availability**, and **Partition Tolerance*</text></g><g id="g6"><text x="0" textLength="168" class="foreground">* (network failures).</text></g><g id="g7"><text x="0" textLength="8" class="color6">$</text><text x="8" textLength="408" class="foreground"> freellmpool providers   # works with zero API keys</text></g><g id="g8"><text x="0" textLength="352" class="foreground">freellmpool catalog: 16 providers, 56 models</text></g><g id="g9"><text x="0" textLength="560" class="foreground">  &#10003; pollinations Pollinations (keyless)        3 models   [configured]</text></g><g id="g10"><text x="0" textLength="560" class="foreground">  &#10003; llm7         LLM7 (key optional)           1 models   [configured]</text></g><g id="g11"><text x="0" textLength="584" class="foreground">  &#10003; ovh          OVHcloud AI Endpoints (keyless)  5 models   [configured]</text></g><g id="g12"><text x="0" textLength="608" class="foreground">  &#183; groq         Groq                          6 models   [set GROQ_API_KEY]</text></g><g id="g13"><text x="0" textLength="640" class="foreground">  &#183; cerebras     Cerebras                      4 models   [set CEREBRAS_API_KEY]</text></g><g id="g14"><text x="0" textLength="8" class="color6">$</text><text x="8" textLength="472" class="foreground"> freellmpool proxy   # drop-in OpenAI endpoint for any tool</text></g><g id="g15"><text x="0" textLength="576" class="foreground">freellmpool proxy on http://127.0.0.1:8080/v1  (16 providers, 56 models)</text></g></defs><g id="screen_view"><g><use xlink:href="#g1" y="0"/><rect x="0" y="17" width="8" height="17" class="foreground"/><use xlink:href="#g2" y="17"/></g><g><use xlink:href="#g1" y="442"/><use xlink:href="#g3" y="459"/><rect x="0" y="476" width="8" height="17" class="foreground"/><use xlink:href="#g2" y="476"/></g><g><use xlink:href="#g1" y="884"/><use xlink:href="#g3" y="901"/><use xlink:href="#g4" y="918"/><use xlink:href="#g5" y="935"/><use xlink:href="#g6" y="952"/><rect x="0" y="969" width="8" height="17" class="foreground"/><use xlink:href="#g2" y="969"/></g><g><use xlink:href="#g1" y="1326"/><use xlink:href="#g3" y="1343"/><use xlink:href="#g4" y="1360"/><use xlink:href="#g5" y="1377"/><use xlink:href="#g6" y="1394"/><use xlink:href="#g7" y="1411"/><rect x="0" y="1428" width="8" height="17" class="foreground"/><use xlink:href="#g2" y="1428"/></g><g><use xlink:href="#g1" y="1768"/><use xlink:href="#g3" y="1785"/><use xlink:href="#g4" y="1802"/><use xlink:href="#g5" y="1819"/><use xlink:href="#g6" y="1836"/><use xlink:href="#g7" y="1853"/><use xlink:href="#g8" y="1870"/><use xlink:href="#g9" y="1904"/><use xlink:href="#g10" y="1921"/><use xlink:href="#g11" y="1938"/><use xlink:href="#g12" y="1955"/><use xlink:href="#g13" y="1972"/><rect x="0" y="1989" width="8" height="17" class="foreground"/><use xlink:href="#g2" y="1989"/></g><g><use xlink:href="#g1" y="2210"/><use xlink:href="#g3" y="2227"/><use xlink:href="#g4" y="2244"/><use xlink:href="#g5" y="2261"/><use xlink:href="#g6" y="2278"/><use xlink:href="#g7" y="2295"/><use xlink:href="#g8" y="2312"/><use xlink:href="#g9" y="2346"/><use xlink:href="#g