<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540" role="img" aria-labelledby="title desc">
  <title id="title">freellmpool tokenmax terminal demo</title>
  <desc id="desc">A looping terminal demo showing freellmpool tokenmax fan out to free models, then synthesize the result.</desc>
  <defs>
    <style>
      :root { --animation-duration: 8500ms; }
      .bg { fill: #0b1020; }
      .panel { fill: #121a2b; stroke: #273149; stroke-width: 1; }
      .muted { fill: #8da0bf; }
      .text { fill: #eef4ff; font: 18px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
      .small { font-size: 15px; }
      .prompt { fill: #63d297; }
      .dim { fill: #64748b; }
      .cyan { fill: #60d5f7; }
      .pink { fill: #ff6aa2; }
      .yellow { fill: #ffd166; }
      .green { fill: #84e88b; }
      .purple { fill: #b69cff; }
      .line { opacity: 0; animation: show var(--animation-duration) steps(1, end) infinite; }
      .l1 { animation-delay: 0ms; }
      .l2 { animation-delay: 900ms; }
      .l3 { animation-delay: 1600ms; }
      .l4 { animation-delay: 2500ms; }
      .l5 { animation-delay: 3400ms; }
      .l6 { animation-delay: 4300ms; }
      .l7 { animation-delay: 5200ms; }
      .l8 { animation-delay: 6100ms; }
      .cursor { animation: blink 900ms steps(1, end) infinite; }
      @keyframes show { 0%, 100% { opacity: 1; } }
      @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    </style>
  </defs>
  <rect class="bg" width="960" height="540" rx="18"/>
  <rect class="panel" x="34" y="32" width="892" height="476" rx="12"/>
  <circle cx="62" cy="58" r="7" fill="#ff5f57"/>
  <circle cx="84" cy="58" r="7" fill="#febc2e"/>
  <circle cx="106" cy="58" r="7" fill="#28c840"/>
  <text x="132" y="64" class="text small muted">freellmpool local terminal</text>

  <g transform="translate(58 108)">
    <text class="text line l1" x="0" y="0"><tspan class="prompt">$</tspan> pip install freellmpool</text>
    <text class="text line l2" x="0" y="42"><tspan class="green">Successfully installed freellmpool-0.11.4</tspan> <tspan class="dim">(httpx only)</tspan></text>
    <text class="text line l3" x="0" y="84"><tspan class="prompt">$</tspan> freellmpool tokenmax "name this free LLM gateway" --max-models 6</text>
    <text class="text line l4" x="0" y="126"><tspan class="pink">TOKENMAXXING</tspan> <tspan class="yellow">6/6</tspan> models across <tspan class="cyan">4 providers</tspan></text>
    <text class="text line l5" x="0" y="168"><tspan class="cyan">pollinations/openai</tspan>       "freellmpool"</text>
    <text class="text line l5" x="0" y="202"><tspan class="purple">ovh/Meta-Llama-3_3-70B</tspan>   "FreePool"</text>
    <text class="text line l6" x="0" y="236"><tspan class="yellow">kilo/openrouter/free</tspan>      "ZeroKey"</text>
    <text class="text line l6" x="0" y="270"><tspan class="green">llm7/qwen3-235b</tspan>           "PoolPilot"</text>
    <text class="text line l7" x="0" y="326"><tspan class="pink">SYNTHESIS</tspan> freellmpool: one local API over the free tiers.</text>
    <text class="text line l8" x="0" y="382"><tspan class="green">freellmpool catalog:</tspan> 19 providers, 238 models - 19 free tiers - $0 to start</text>
    <rect class="cursor" x="0" y="404" width="10" height="22" fill="#eef4ff"/>
  </g>
</svg>
