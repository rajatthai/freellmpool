    <g transform="translate(908 104)">
      <rect x="0" y="0" width="166" height="286" rx="24" fill="#0f1318" stroke="#ffffff" stroke-opacity="0.11"/>
      <circle cx="42" cy="48" r="12" fill="#65e4b6"/>
      <circle cx="82" cy="48" r="12" fill="#7cc7ff"/>
      <circle cx="122" cy="48" r="12" fill="#ffbd59"/>
      <path d="M36 108 L130 108" stroke="#aebbc8" stroke-width="12" stroke-linecap="round" opacity="0.74"/>
      <path d="M36 152 L106 152" stroke="#65e4b6" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
      <path d="M36 196 L130 196" stroke="#7cc7ff" stroke-width="12" stroke-linecap="round" opacity="0.86"/>
      <path d="M36 240 L90 240" stroke="#ffbd59" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
