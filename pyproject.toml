[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llmbuffet"
version = "0.1.0"
description = "An all-you-can-eat buffet of free-tier LLM APIs behind one OpenAI-compatible endpoint, with automatic failover and quota tracking."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{ name = "Andrew" }]
keywords = [
    "llm",
    "openai",
    "proxy",
    "gateway",
    "router",
    "free",
    "groq",
    "cerebras",
    "openrouter",
    "gemini",
    "load-balancer",
    "failover",
]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
    "Topic :: Utilities",
]
dependencies = [
    "httpx>=0.27",
]

[project.urls]
Homepage = "https://github.com/0xzr/llmbuffet"
Repository = "https://github.com/0xzr/llmbuffet"
Issues = "https://github.com/0xzr/llmbuffet/issues"

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
]

[project.scripts]
llmbuffet = "llmbuffet.cli:main"
buffet = "llmbuffet.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/llmbuffet"]

[tool.hatch.build.targets.wheel.force-include]
"src/llmbuffet/providers.toml" = "llmbuffet/providers.toml"

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
